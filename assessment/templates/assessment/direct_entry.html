<!DOCTYPE html>
<html lang="zh-hans">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>开始测评 - 智善TIC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f5f7fa,#e8ecf1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:500px}
.brand{text-align:center;margin-bottom:24px}
.brand .logo{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#4a6fa5,#3a5a8a);color:#fff;padding:12px 24px;border-radius:12px;font-size:18px;font-weight:700;box-shadow:0 4px 20px rgba(74,111,165,.3)}
.brand .logo i{font-size:22px}
.card{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.08);overflow:hidden;padding:30px}
.card h2{text-align:center;color:#3a5a8a;margin-bottom:6px;font-size:20px}
.card .exam-name{text-align:center;color:#7f8c9b;font-size:14px;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#455a64;margin-bottom:4px}
.form-group label .req{color:#e74c3c}
.form-group input{width:100%;padding:12px 14px;border:2px solid #e0e4e8;border-radius:10px;font-size:15px;outline:none}
.form-group input:focus{border-color:#4a6fa5}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#4a6fa5,#3a5a8a);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px}
.btn:hover{box-shadow:0 6px 20px rgba(74,111,165,.35)}
.error{color:#e74c3c;font-size:13px;text-align:center;margin-bottom:12px}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#b0bec5}
</style>
</head>
<body>
<div class="container">
<div class="brand"><div class="logo"><i class="fas fa-star"></i><span>智善TIC · 人才测评</span></div></div>
<div class="card">
<h2>📝 开始测评</h2>
<div class="exam-name">{% if exam %}{{ exam.name }}{% endif %}</div>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post">{% csrf_token %}
<div class="form-group"><label>姓名 <span class="req">*</span></label><input type="text" name="name" placeholder="请输入您的姓名" required></div>
<div class="form-group"><label>手机号 <span class="req">*</span></label><input type="text" name="phone" placeholder="请输入您的手机号" required></div>
<div class="form-group"><label>岗位</label><input type="text" name="position" placeholder="请输入您的岗位（选填）"></div>
<button type="submit" class="btn">开始测评 →</button>
</form>
</div>
<div class="footer">智善TIC人才测评体系</div>
</div>
</body>
</html>
