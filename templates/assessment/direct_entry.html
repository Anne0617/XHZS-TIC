<!DOCTYPE html>
<html lang="zh-hans">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ exam.name }} - 欢迎参加测评</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{max-width:480px;width:100%;margin:40px 16px;}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,0.06);padding:36px;}
.card .exam-badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;margin-bottom:12px;}
.card h2{font-size:20px;text-align:center;margin-bottom:4px;color:#0a2463;}
.card .sub{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:#475569;}
.form-group .required{color:#dc2626;}
.form-group input{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;outline:none;transition:border-color 0.15s;}
.form-group input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-submit{width:100%;padding:12px;background:#0a2463;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn-submit:hover{background:#1a3a7a;}
.error{color:#dc2626;font-size:13px;text-align:center;margin-bottom:12px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
</style></head>
<body><div class="wrap">
<div class="card">
{% if exam %}
<div class="exam-badge" style="background:{% if exam.exam_type == 'comprehensive' %}#2563eb{% elif exam.exam_type == 'bigfive' %}#7c3aed{% elif exam.exam_type == 'pdp' %}#ea580c{% elif exam.exam_type == 'mbti' %}#0891b2{% else %}#64748b{% endif %};">{{ exam.name }}</div>
{% endif %}
<h2>欢迎参加测评</h2>
<p class="sub">请填写您的信息后开始作答</p>

{% if messages %}{% for msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}{% endif %}

<form method="post" action="">
{% csrf_token %}
<div class="form-group"><label>姓名 <span class="required">*</span></label>
<input type="text" name="name" required placeholder="请输入您的姓名"></div>
<div class="form-group"><label>手机号 <span class="required">*</span></label>
<input type="tel" name="phone" required placeholder="请输入您的手机号"></div>
<div class="form-row">
<div class="form-group"><label>面试部门</label>
<input type="text" name="department" placeholder="如: 人力资源部"></div>
<div class="form-group"><label>面试岗位（选填）</label>
<input type="text" name="position" placeholder="如: 产品经理"></div>
</div>
<button type="submit" class="btn-submit">开始作答</button>
</form>
</div></div></body></html>
